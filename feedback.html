<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width,initial-scale=1" />
  <title>Responsive Page with Tic-Tac-Toe</title>
  <link rel="stylesheet" href="style.css">
   
</head>
<body>
  <header>
      <div>
        <div style="font-weight:700">Boeing Responsive UI</div>
      </div>
    </div>
     <nav aria-label="Main">
      <a href="tictactoe.html">Game</a>
      <a href="index.html">Home</a>
      <div>
        <button id="themeToggle">🌓</button>
      </div>
    </nav>
  </header>

   
  <main class="container">
              <aside class="card" id="contact" aria-labelledby="contactTitle">
      <div class="small-header">
        <h3 id="contactTitle" style="margin:0">Contact Form</h3>
      </div>

      <form id="demoForm" novalidate>
        <div>
          <label for="name">Name</label>
          <input id="name" name="name" type="text" placeholder="Your name" required />
        </div>

        <div>
          <label for="email">Email</label>
          <input id="email" name="email" type="email" placeholder="you@example.com" required />
        </div>

        <div>
          <label for="topic">Topic</label>
          <select id="topic" name="topic">
            <option>Feedback</option>
            <option>Suggestion</option>
            <option>Support</option>
          </select>
        </div>

        <div>
          <label for="message">Message</label>
          <textarea id="messageInput" name="message" placeholder="How can we help?"></textarea>
        </div>

        <div style="display:flex; gap:0.5rem; align-items:center;">
          <button type="submit">Send</button>
          <button type="reset" class="ghost">Reset</button>
        </div>

        <div class="muted" id="formResult" style="margin-top:0.5rem;"></div>
      </form>

      <hr style="margin:1rem 0; border:none; height:1px; background: rgba(0,0,0,0.04);" />
      <div class="muted">
        <strong>About</strong>
        <p style="margin-top:0.5rem">This static demo shows layout, forms, JS interactivity, and a small game. Save the file locally and open in your browser to try it out.</p>
      </div>
    </aside>
  </main>
   <script>
  const toggleBtn = document.getElementById("themeToggle");

  toggleBtn.addEventListener("click", () => {
    document.body.classList.toggle("dark-mode");
  });
</script>
</body>
<footer>
    © 2026 Demo — Built with HTML, CSS, and JavaScript.
  </footer>
