<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width,initial-scale=1" />
  <title>Tic Tac Toe Home</title>
  <link rel="stylesheet" href="styles.css">
</head>

<body>

  <header>
    <div style="font-weight:700">
      🎮 Tic Tac Toe
    </div>

    <button id="themeToggle">🌓</button>
  </header>

  <main class="hero">

    <!-- Background Tic-Tac-Toe Symbols -->
    <div class="floating x1">❌</div>
    <div class="floating o1">⭕</div>
    <div class="floating x2">❌</div>
    <div class="floating o2">⭕</div>

    <h1>Welcome</h1>

    <p>
      Play the classic Tic-Tac-Toe game, challenge your friends,
      and track your victories on the scoreboard.
    </p>

    <nav aria-label="Main">
      <a href="tictactoe.html">🎮 Play Game</a>
      <a href="score.html">🏆 Scoreboard</a>
    </nav>

  </main>

  <footer>
    © 2026 Demo — Built with HTML, CSS, and JavaScript.
  </footer>

  <script>
    const toggleBtn = document.getElementById("themeToggle");

    toggleBtn.addEventListener("click", () => {
      document.body.classList.toggle("dark-mode");
    });
  </script>

</body>
</html></script>
</body></html>
