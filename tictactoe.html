<!DOCTYPE html>
<html lang="en">
<head><meta charset="UTF-8">

     <link rel="stylesheet" href="style.css">
     <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@200&family=Roboto+Serif&display=swap" rel="stylesheet">

<body>
    <header><h1>🎮 Tic Tac Toe</h1>

<nav>

    <div class="nav-links">
        <a href="index.html">Home</a>

</nav>

</header>
        <div id="title">
        <h1>Tic Tac Toe</h1>

        <div id="board">

    <div id="popupMessage"></div>
        <div id="endGame">
        <input type="button" value="Play/Restart" id="restartButton" onclick="restartButton()"/> </div>
        <footer>
    © 2026 Demo — Built with HTML, CSS, and JavaScript.
  </footer>
        
         <script>
  const toggleBtn = document.getElementById("themeToggle");

  toggleBtn.addEventListener("click", () => {
    document.body.classList.toggle("dark-mode");
  });
</script>
<script src="game.js"></script>
